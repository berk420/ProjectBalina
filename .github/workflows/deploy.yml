name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restart backend
        run: pm2 restart balina-api

      - name: Deploy frontend build
        run: |
          robocopy "${{ github.workspace }}\frontend\build" "C:\inetpub\wwwroot\Balina-front\build" /E /PURGE
          Copy-Item "${{ github.workspace }}\icon.png" "C:\inetpub\wwwroot\Balina-front\build\icon.png" -Force

      - name: Deploy backend dist
        run: |
          robocopy "${{ github.workspace }}\backend\dist" "C:\inetpub\wwwroot\Balina-api\dist" /E /PURGE
